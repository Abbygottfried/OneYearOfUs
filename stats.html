<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gus and Abby</title>
    <style>
        /* General Body and Layout Styling */
        body {
            font-family: 'Arial', Helvetica, sans-serif;
            background-color: #fbceda ;
            color: rgb(65, 0, 17);
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /*brown:#352c23 green:#516941 LGreen:#6a8a54 Tan: #c0a78d */
        /* Header Section */
        header {
            background-color: #fbceda;
            color: rgb(144, 1, 1);
            padding: 25px 0;
            text-align: center;
            font-size: 5em;
            letter-spacing: 2px;
        }

        /* Navigation Bar */
        nav {
            text-align: center;
            margin: 20px 0;
            padding: 10px;
            background-color: rgb(65, 0, 17);
        }

        nav a {
            text-decoration: none;
            color: white;
            font-size: 1.2em;
            padding: 10px 20px;
            margin: 0 15px;
            transition: background-color 0.3s;
        }

        nav a:hover {
            background-color: #e62e5f;
            color: #fff;
            border-radius: 5px;
        }

        article a {
            text-decoration: none;
            color: rgb(65, 0, 17);
            font-size: 1.2em;
            padding: 10px 20px;
            margin: 0 15px;
            transition: background-color 0.3s;
        }

        article a:hover {
            background-color: #e62e5f;
            color: #fff;
            border-radius: 5px;
        }
        /* Layout for the main content */
        main {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Sidebar Image Styling */
        aside {
            flex: 1;
            padding: 20px;
            text-align: center;
        }

        aside img {
            width: 100%;
            max-width: 200px;
            height: auto;
            border-radius: 8px;
            
        }
          article img {
            width: 100%;
            max-width: 600px;
            height: auto;
            border-radius: 8px;

        }
         header img {
            width: 100%;
            max-width: 100px;
            height: auto;
        }
        /* Main Section Styling */
        section {
            flex: 2;
            padding: 20px;
        }

        section header {
            font-size: 2em;
            margin-bottom: 15px;
            color: #ffffff;
        }

        article {
            font-size: 1.2em;
            line-height: 1.8;
            color: #555;
            text-align: justify;
        }

        /* Footer Section */
        footer {
            background-color: rgb(65, 0, 17);
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
            bottom: 0;
            width: 100%;
        }

        footer a {
            text-decoration: none;
            color: white;
            font-size: 1.2em;
            padding: 10px 20px;
            margin: 0 15px;
            transition: background-color 0.3s;
        }

        footer a:hover {
            background-color: #e62e5f;
            color: #fff;
            border-radius: 5px;
        }  /* Stardew Valley font (place StardedValley.ttf in /fonts/) */
        @font-face{
            font-family: 'StardewValley';
            src: url('fonts/StardewValley.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        /* Heart hero and SDV banner styles */
    .heart-hero{display:flex;align-items:center;justify-content:center;padding:28px 12px;background:transparent;width:100%;position:relative;z-index:2;margin-bottom:18px}
        .heart-wrap{display:flex;flex-direction:column;align-items:center;gap:10px}
        .day-label{font-size:18px;text-transform:lowercase;color:rgb(65,0,17);font-weight:700}
        .heart-box{position:relative;display:flex;align-items:center;justify-content:center}
        .heart{width:160px;height:auto;transform-origin:center center;animation:pulse 1.6s ease-in-out infinite}
        .day-count{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:36px;font-weight:800;color:white;letter-spacing:1px;text-shadow:0 4px 12px rgba(0,0,0,0.5)}
        @keyframes pulse{0%{transform:scale(1)}45%{transform:scale(1.12)}100%{transform:scale(1)}}
        @media (prefers-reduced-motion:reduce){.heart{animation:none}}

    .sdv-banner{display:flex;align-items:center;justify-content:center;padding:18px 12px;width:100%;position:relative;z-index:1;margin-top:0}
        .sdv-wrap{position:relative;max-width:680px;width:100%}
        .sdv-wrap img{display:block;width:100%;height:auto}
        .sdv-text{width:55%;position:absolute;left:19%;top:55%;transform:translate(-30%,-70%);font-family:'StardewValley','Fredoka One',cursive;font-size:30px;color:#4f2d07;text-align:left;pointer-events:none;text-shadow:0 1px 5px rgba(0,0,0,0.6)}
        @media (max-width:155px){.sdv-text{font-size:5px}}
    /* SDV characters row and popup bubble */
    .sdv-characters-section{margin-top:60px;padding-bottom:10px}
    .sdv-characters{display:flex;gap:18px;justify-content:center;align-items:flex-end}
        /* make each char wrapper a fixed-height flexbox so image bottoms align */
        .char-wrap{position:relative;width:96px;max-width:120px;display:flex;align-items:flex-end;height:120px}
        /* keep all character images the same width (fill wrapper) and let height vary */
        /* removed the drop-shadow per user request (no shadow boxes) */
        .sdv-char{display:block;width:100%;height:auto;cursor:pointer;border-radius:8px;box-shadow:none;transition:transform .12s}
    /* when two .sdv-banner sections are stacked, add more vertical space before the character row */
    .sdv-banner + .sdv-banner { margin-top: 150px; }
    .sdv-char:active{transform:translateY(2px)}
    /* bubble now contains an image and text overlay; no solid background color */
    .bubble{position:absolute;left:65%;bottom:calc(100% + 12px);transform:translateX(-50%);background:transparent;color:#fff;padding:0;z-index:1000;font-size:14px;overflow:hidden;min-width:120px}
    /* raise bubble slightly for Abby and Gus (middle two characters) */
    .char-wrap.abby .bubble{ bottom: calc(100% + 80px); }
    .char-wrap.gus .bubble { bottom: calc(100% + 100px); }
    .char-wrap.Dog .bubble{ bottom: calc(100% + 10px); }
    .char-wrap.Cat .bubble { bottom: calc(100% + 0px); }
    .bubble-img{display:block;width:80px;height:auto;max-width:160px;object-fit:cover;display:block}
    .bubble-text{position:absolute;left:50%;bottom:8px;transform:translateX(-50%);color:#fff;padding:6px 8px;font-size:13px;text-shadow:0 2px 6px rgba(0,0,0,0.7);white-space:nowrap}
    .fade-out{animation:fadeOut .6s forwards}
    @keyframes fadeOut{from{opacity:1;transform:translateX(-50%) translateY(0)}to{opacity:0;transform:translateX(-50%) translateY(-8px)}}
    @media (max-width:520px){.sdv-characters{gap:10px}.char-wrap{width:72px}}
        @media (max-width:520px){.sdv-characters{gap:10px}.char-wrap{width:72px;height:96px}}
    </style>
</head>
<body>

    <header>
       <img src="img/SDHeart.png" alt="SDHeart">
        One Year of Us
         <img src="img/SDHeart.png" alt="SDHeart">
    </header>

    <nav>
        <a href="Index.html">Home</a>
        <a href="adventures.html">Adventures</a>
        <a href="game.html">Game</a>
        <a href="slideshow.html">Photos</a>
        <a href="LoveLetter.html">Letter</a>
    </nav>

    <!-- Heart counter hero (days since 2025-04-09) -->
    <section class="heart-hero" aria-label="Days since we became us">
        <div class="heart-wrap">
            <div class="day-label">Days since me became we</div>
            <div class="heart-box">
                <svg class="heart" viewBox="0 0 32 29.6" aria-hidden="true" focusable="false">
                    <path d="M23.6,0c-2.9,0-5.4,1.6-6.6,4C15.8,1.6,13.3,0,10.4,0C4.6,0,0,4.9,0,10.9C0,20.1,9.5,24.9,16,29.6
                    c6.5-4.7,16-9.5,16-18.7C32,4.9,27.4,0,23.6,0z" fill="#e83b50"/>
                </svg>
                <div class="day-count" id="dayCount">0</div>
            </div>
        </div>
    </section>

    <!-- SDV banner: overlay text on TextSDV.png (requires fonts/StardewValley.ttf to be present) -->
    <section class="sdv-banner" aria-label="SDV banner">
        <div class="sdv-wrap">
            <img src="img/TextSDV.png" alt="SDV background">
            <div class="sdv-text" id="sdvText">Hello my love, hope you are enjoying the site! I'm here to tell you we've played 31 hours and 46 minutes on StardewValley.</div>
        </div>
    </section>
<section class="sdv-banner" aria-label="SDV banner">

           <div class="char-wrap Dog">
                <img class="sdv-char" src="img/SDVDog.png" alt="Dog"  data-bubble-img="img/SDHeart.png">
            </div>
            <div class="char-wrap abby">
                <img class="sdv-char" src="img/SDVAbby.png" alt="Abby"  data-bubble-img="img/SDHeart.png">
            </div>
            <div class="char-wrap gus">
                <img class="sdv-char" src="img/SDVGus.png" alt="Gus"  data-bubble-img="img/SDVsmile.png">
            </div>
     
            <div class="char-wrap Cat">
                <img class="sdv-char" src="img/SDVCat.png" alt="Cat"  data-bubble-img="img/SDHeart.png">
            </div>
     

        </div>
    </section>
    <footer>
        <p> April 09 | Gus and Abby | 2025 - 2026 </p>
    </footer>
 <script>
        // days-since counter (since 2025-04-09)
        (function(){
            const start = new Date(Date.UTC(2025,3,9)); // months are 0-indexed; April = 3
            const el = document.getElementById('dayCount');
            if(!el) return;
            function update(){
                const now = new Date();
                // calculate difference in full days
                const diff = Math.floor((now - start) / (1000*60*60*24));
                el.textContent = diff >= 0 ? diff : 0;
            }
            update();
            // refresh once per minute in case page stays open across midnight
            setInterval(update, 60*1000);
        })();
    </script>
    <script>
    // SDV character bubble popups
    (function(){
        const chars = document.querySelectorAll('.sdv-char');
        if(!chars || chars.length===0) return;

        chars.forEach(img=>{
            img.addEventListener('click', function(ev){
                ev.stopPropagation();
                const wrap = img.parentElement;
                // toggle existing bubble for this char
                const existing = wrap.querySelector('.bubble');
                if(existing){ existing.remove(); return; }
                const msg = img.dataset.message || '';
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                // image for bubble (from data attribute or fall back to character src)
                const imgSrc = img.dataset.bubbleImg || img.src;
                const bImg = document.createElement('img');
                bImg.className = 'bubble-img';
                bImg.src = imgSrc;
                bImg.alt = '';
                bubble.appendChild(bImg);
                const t = document.createElement('div');
                t.className = 'bubble-text';
                t.textContent = msg;
                bubble.appendChild(t);
                wrap.appendChild(bubble);
                // auto-hide after 3s with fade
                setTimeout(()=>{ bubble.classList.add('fade-out'); setTimeout(()=>bubble.remove(), 600); }, 3000);
            });
        });

        // clicking elsewhere closes any open bubble
        document.addEventListener('click', () => document.querySelectorAll('.bubble').forEach(b=>b.remove()));
    })();
    </script>
</body>
</html>
