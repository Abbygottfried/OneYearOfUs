/* Slideshow layout: two slideshows split the screen */
.slides-wrapper { display: flex; gap: 12px; align-items: flex-start; }
.slideshow-container {
  flex: 1 1 0;
  position: relative;
  margin: auto;
  max-width: none;
}

/* Hide the images by default */
.mySlides, .mySlides1, .mySlides2 {
  display: none;
}

/* Force slides to have a fixed height and auto width (overrides inline width) */
.mySlides img, .mySlides1 img, .mySlides2 img {
  width: auto !important;
  height: 480px; /* set the exact height you want */
  max-height: 70vh; /* responsive cap */
  object-fit: cover; /* crop if needed while preserving aspect */
  display: block;
  margin: 0 auto;
}

/* Next & previous buttons */
/* style for prev/next when shown above the image in a top bar */
.prev, .next {
  cursor: pointer;
  width: auto;
  padding: 10px 14px;
  color: white;
  font-weight: bold;
  font-size: 18px;
  transition: 0.3s ease;
  border-radius: 8px;
  user-select: none;
  background: rgba(0,0,0,0.6);
}

/* Position the "next button" to the right */


/* On hover, add a black background color with a little bit see-through */
.prev:hover, .next:hover { background-color: rgba(0,0,0,0.85); transform:scale(1.03); }

/* Caption text */
.text {
  color: #f2f2f2;
  font-size: 15px;
  padding: 8px 12px;
  position: absolute;
  bottom: 8px;
  width: 100%;
  text-align: center;
}

/* Number text (1/3 etc) */
.numbertext {
  color: #f2f2f2;
  font-size: 12px;
  padding: 8px 12px;
  position: absolute;
  top: 0;
}

/* The dots/bullets/indicators */
.dot {
  cursor: pointer;
  height: 15px;
  width: 15px;
  margin: 0 2px;
  background-color: #bbb;
  border-radius: 50%;
  display: inline-block;
  transition: background-color 0.6s ease;
}

.active, .dot:hover {
  background-color: #717171;
}

/* Fading animation */
.fade {
  animation-name: fade;
  animation-duration: 1s;
}

@keyframes fade {
  from {opacity: .4}
  to {opacity: 1}
}

/* top arrow container */
.arrow-top{position:absolute;left:50%;top:54px;transform:translateX(-50%);display:flex;gap:10px;z-index:20}
.slideshow-container{padding-top:56px}

   <script>
    // Left slideshow
    let slideIndex1 = 1;
    showSlides1(slideIndex1);

    function plusSlides1(n) { showSlides1(slideIndex1 += n); }
    function currentSlide1(n) { showSlides1(slideIndex1 = n); }
    function showSlides1(n) {
      let i;
      let slides = document.getElementsByClassName("mySlides1");
      let dots = document.querySelectorAll('#slideshow1 + br ~ div > div:first-child .dot, #slideshow1 ~ div .dot');
      if (n > slides.length) { slideIndex1 = 1 }
      if (n < 1) { slideIndex1 = slides.length }
      for (i = 0; i < slides.length; i++) slides[i].style.display = "none";
      // dots for slideshow1 are the first group — simpler to query by position in DOM below, so just update by index
      const dotGroup1 = document.querySelectorAll('div[style*="display:flex"] > div:first-child .dot');
      for (i = 0; i < dotGroup1.length; i++) dotGroup1[i].className = dotGroup1[i].className.replace(" active", "");
      slides[slideIndex1-1].style.display = "block";
      if (dotGroup1[slideIndex1-1]) dotGroup1[slideIndex1-1].className += " active";
    }

    // Right slideshow
    let slideIndex2 = 1;
    showSlides2(slideIndex2);

    function plusSlides2(n) { showSlides2(slideIndex2 += n); }
    function currentSlide2(n) { showSlides2(slideIndex2 = n); }
    function showSlides2(n) {
      let i;
      let slides = document.getElementsByClassName("mySlides2");
      const dotGroup2 = document.querySelectorAll('div[style*="display:flex"] > div:last-child .dot');
      if (n > slides.length) { slideIndex2 = 1 }
      if (n < 1) { slideIndex2 = slides.length }
      for (i = 0; i < slides.length; i++) slides[i].style.display = "none";
      for (i = 0; i < dotGroup2.length; i++) dotGroup2[i].className = dotGroup2[i].className.replace(" active", "");
      slides[slideIndex2-1].style.display = "block";
      if (dotGroup2[slideIndex2-1]) dotGroup2[slideIndex2-1].className += " active";
    }
      </script>
