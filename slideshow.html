        /* General Body and Layout Styling */
        body {
            font-family: 'Arial', Helvetica, sans-serif;
            background-color: #fbceda ;
            color: rgb(65, 0, 17);
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /*brown:#352c23 green:#516941 LGreen:#6a8a54 Tan: #c0a78d */
        /* Header Section */
        header {
            background-color: #fbceda;
            color: rgb(144, 1, 1);
            padding: 25px 0;
            text-align: center;
            font-size: 5em;
            letter-spacing: 2px;
        }

        /* Navigation Bar */
        nav {
            text-align: center;
            margin: 20px 0;
            padding: 10px;
            background-color: rgb(65, 0, 17);
        }

        nav a {
            text-decoration: none;
            color: white;
            font-size: 1.2em;
            padding: 10px 20px;
            margin: 0 15px;
            transition: background-color 0.3s;
        }

        nav a:hover {
            background-color: #e62e5f;
            color: #fff;
            border-radius: 5px;
        }

        article a {
            text-decoration: none;
            color: rgb(65, 0, 17);
            font-size: 1.2em;
            padding: 10px 20px;
            margin: 0 15px;
            transition: background-color 0.3s;
        }

        article a:hover {
            background-color: #e62e5f;
            color: #fff;
            border-radius: 5px;
        }
        /* Layout for the main content */
        main {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Sidebar Image Styling */
        aside {
            flex: 1;
            padding: 20px;
            text-align: center;
        }

        aside img {
            width: 100%;
            max-width: 200px;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgb(65, 0, 17);
        }
          article img {
            width: 100%;
            max-width: 600px;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgb(65, 0, 17);
        }
         header img {
            width: 100%;
            max-width: 100px;
            height: auto;
        }
        /* Main Section Styling */
        section {
            flex: 2;
            padding: 20px;
        }

        section header {
            font-size: 2em;
            margin-bottom: 15px;
            color: #ffffff;
        }

        article {
            font-size: 1.2em;
            line-height: 1.8;
            color: #555;
            text-align: justify;
        }

        /* Footer Section */
        footer {
            background-color: rgb(65, 0, 17);
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
            bottom: 0;
            width: 100%;
        }

        footer a {
            text-decoration: none;
            color: white;
            font-size: 1.2em;
            padding: 10px 20px;
            margin: 0 15px;
            transition: background-color 0.3s;
        }

        footer a:hover {
            background-color: #e62e5f;
            color: #fff;
            border-radius: 5px;
        }  /* Stardew Valley font (place StardedValley.ttf in /fonts/) */
        * {box-sizing:border-box}

/* Slideshow layout: two slideshows split the screen */
.slides-wrapper { display: flex; gap: 12px; align-items: flex-start; }
.slideshow-container {
  flex: 1 1 0;
  position: relative;
  margin: auto;
  max-width: none;
}

/* Hide the images by default */
.mySlides, .mySlides1, .mySlides2 {
  display: none;
}

/* Force slides to have a fixed height and auto width (overrides inline width) */
.mySlides img, .mySlides1 img, .mySlides2 img {
  width: auto !important;
  height: 480px; /* set the exact height you want */
  max-height: 70vh; /* responsive cap */
  object-fit: cover; /* crop if needed while preserving aspect */
  display: block;
  margin: 0 auto;
}

/* Next & previous buttons */
/* style for prev/next when shown above the image in a top bar */
.prev, .next {
  cursor: pointer;
  width: auto;
  padding: 10px 14px;
  color: white;
  font-weight: bold;
  font-size: 18px;
  transition: 0.3s ease;
  border-radius: 8px;
  user-select: none;
  background: rgba(0,0,0,0.6);
}

/* Position the "next button" to the right */


/* On hover, add a black background color with a little bit see-through */
.prev:hover, .next:hover { background-color: rgba(0,0,0,0.85); transform:scale(1.03); }

/* Caption text */
.text {
  color: #f2f2f2;
  font-size: 15px;
  padding: 8px 12px;
  position: absolute;
  bottom: 8px;
  width: 100%;
  text-align: center;
}

/* Number text (1/3 etc) */
.numbertext {
  color: #f2f2f2;
  font-size: 12px;
  padding: 8px 12px;
  position: absolute;
  top: 0;
}

/* The dots/bullets/indicators */
.dot {
  cursor: pointer;
  height: 15px;
  width: 15px;
  margin: 0 2px;
  background-color: #bbb;
  border-radius: 50%;
  display: inline-block;
  transition: background-color 0.6s ease;
}

.active, .dot:hover {
  background-color: #717171;
}

/* Fading animation */
.fade {
  animation-name: fade;
  animation-duration: 1s;
}

@keyframes fade {
  from {opacity: .4}
  to {opacity: 1}
}

/* top arrow container */
.arrow-top{position:absolute;left:50%;top:54px;transform:translateX(-50%);display:flex;gap:10px;z-index:20}
.slideshow-container{padding-top:56px}


.gallery {
  column-count: 5;

  width: 90%;
  margin: 40px auto;
}
.gallery-item {
  background: white;
  margin-bottom: 20px;
  border-radius: 16px;
  overflow: hidden;
  break-inside: avoid;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  transition: transform 0.25s ease, box-shadow 0.25s ease;
  max-width: 200px;
  height: auto;
}

.gallery-item:hover {
  transform: translateY(-5px) scale(1.02);
  box-shadow: 0 12px 30px rgba(30, 111, 255, 0.2); /* your blue glow */
}

.gallery-item img {
  width: 100%;
  display: block;
}

/* Responsive columns */
@media (max-width: 1200px) {
  .gallery { column-count: 4; }
}

@media (max-width: 900px) {
  .gallery { column-count: 3; }
}

@media (max-width: 600px) {
  .gallery { column-count: 2; }
}

@media (max-width: 400px) {
  .gallery { column-count: 1; }
}
