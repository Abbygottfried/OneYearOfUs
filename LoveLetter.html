<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Strawberry Milk Envelope</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #ffeef7; /* strawberry milk background */
    font-family: "Poppins", sans-serif;
  }

  .envelope-container {
    position: relative;
    width: 440px;
    height: 360px;
  }

  /* Envelope body (white) */
  .envelope {
    position: relative;
    width: 100%;
    height: 250px;
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.15);
    overflow: hidden;
  }

  /* Bottom triangle (point UP) */
  .envelope::before {
    content: "";
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    border-style: solid;
    border-width: 130px 220px 0 220px;
    border-color: #ffffff transparent transparent transparent; /* soft strawberry pink */
  }

  /* Top flap (flat side UP, point DOWN) */
  .flap {
    position: absolute;
    top: 0;
    left: 50%;
    transform-origin: top center;
    transform: translateX(-50%);
    border-style: solid;
    border-width: 130px 220px 0 220px;
    border-color: #ffcfe6 transparent transparent transparent; /* strawberry milk pink */
    transition: transform 0.7s ease;
    z-index: 3;
  }

  .open .flap {
    transform: translateX(-50%) rotateX(180deg);
  }

  /* Letter */
  .letter {
    position: absolute;
    left: 50%;
    bottom: 0;
    transform: translate(-50%, 100%);
    width: 350px;
    height: 210px;
    background: #fffdf8;
    border-radius: 10px;
    padding: 22px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    transition: transform 0.8s ease 0.3s;
    z-index: 2;
  }

  .open .letter {
    transform: translate(-50%, -20%);
  }

  .letter h2 {
    margin: 0 0 10px;
    color: #e2558f;
    font-size: 22px;
  }

  .letter p {
    font-size: 15px;
    color: #444;
    line-height: 1.5;
  }

  /* Heart stamp */
  .heart-stamp {
    position: absolute;
    top: 95px;
    left: 50%;
    transform: translateX(-50%);
    width: 55px;
    height: 55px;
    cursor: pointer;
    z-index: 4;
    transition: transform 0.4s ease, opacity 0.4s ease;
  }

  /* Heart halves (closer together now) */
  .heart-stamp::before,
  .heart-stamp::after {
    content: "";
    position: absolute;
    width: 32px;
    height: 48px;
    background: #ff6b9c; /* strawberry heart pink */
    border-radius: 32px 32px 0 0;
    top: 6px;
  }

  .heart-stamp::before {
    left: 1px; /* pulled inward */
    transform: rotate(-45deg);
    transform-origin: bottom right;
  }

  .heart-stamp::after {
    right: 1px; /* pulled inward */
    transform: rotate(45deg);
    transform-origin: bottom left;
  }

  /* Heart falling animation */
  .fall {
    animation: fallAway 1.2s ease-in forwards;
  }

  @keyframes fallAway {
    0% { transform: translateX(-50%) translateY(0); opacity: 1; }
    100% { transform: translateX(-50%) translateY(380px); opacity: 1; }
  }
</style>
</head>
<body>

<div class="envelope-container">
  <div class="envelope" id="env">
    <div class="flap"></div>

    <div class="letter">
      <h2>Hi sweetheart</h2>
      <p>
        Just a tiny note wrapped in strawberry milk softness.  
        You deserve sweetness, warmth, and every gentle thing.
      </p>
    </div>

    <div class="heart-stamp" id="heart"></div>
  </div>
</div>

<script>
  const heart = document.getElementById("heart");
  const env = document.getElementById("env");

  let opened = false;

  heart.addEventListener("click", () => {
    if (opened) return;
    opened = true;

    env.classList.add("open");
    heart.classList.add("fall");

    heart.addEventListener("animationend", () => {
      heart.style.display = "none";
    });
  });
</script>

</body>
</html>
